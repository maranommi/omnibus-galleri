<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omnibus Galleri</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main>

    <header>

      <div class="top-nav">
        <a href="utstillinger.html">Utstillinger</a>
        <a href="#" id="manifest-link">Manifest</a>
      </div>

      <h1>OMNIBUS GALLERI</h1>

      <div class="manifest-text" id="manifest-text">
        <p>Kommer snart</p>
      </div>

    </header>

    <section class="gallery">
      <img src="bilder/bilde1.jpg" alt="Omnibus Galleri">
    </section>

    <section class="info">

      <div class="column left">
        <p>
          Omnibus Galleri<br>
          Bentsebrugata 31C<br>
          0469 Oslo
        </p>
      </div>

      <div class="column center">
        <p>
          info@omnibus.no<br>
          @omnibus_galleri
        </p>
      </div>

      <div class="column right">
        <p>
          Åpent på forespørsel<br>
          eller ved annonsert arrangement
        </p>
      </div>

    </section>

  </main>

<script>
  const manifestLink = document.getElementById("manifest-link");
  const manifestText = document.getElementById("manifest-text");

  manifestLink.addEventListener("click", function(e) {
    e.preventDefault();

    manifestText.classList.toggle("show");
  });
</script>

</body>
</html>
